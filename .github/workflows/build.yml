name: Build Images

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  C4_VERSION: "v1.0.16"

jobs:
  build-c4:
    name: Build c4 minimal
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push c4
        uses: docker/build-push-action@v5
        with:
          context: c4
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/avalanche-io/c4:latest
            ${{ env.REGISTRY }}/avalanche-io/c4:${{ env.C4_VERSION }}
          build-args: |
            C4_VERSION=${{ env.C4_VERSION }}
          platforms: linux/amd64,linux/arm64

  build-pipeline:
    name: Build c4-pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push c4-pipeline
        uses: docker/build-push-action@v5
        with:
          context: c4-pipeline
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/avalanche-io/c4-pipeline:latest
            ${{ env.REGISTRY }}/avalanche-io/c4-pipeline:${{ env.C4_VERSION }}
          build-args: |
            C4_VERSION=${{ env.C4_VERSION }}

  build-s3worker:
    name: Build c4-s3worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push c4-s3worker
        uses: docker/build-push-action@v5
        with:
          context: c4-s3worker
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/avalanche-io/c4-s3worker:latest
            ${{ env.REGISTRY }}/avalanche-io/c4-s3worker:${{ env.C4_VERSION }}
          build-args: |
            C4_VERSION=${{ env.C4_VERSION }}
